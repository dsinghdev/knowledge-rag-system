services:
  rag-app:
    build: .
    container_name: knowledge-rag-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - faiss_index:/app/faiss_index
      - hf_models:/app/models
    stdin_open: true
    tty: true

volumes:
  faiss_index:
  hf_models:
